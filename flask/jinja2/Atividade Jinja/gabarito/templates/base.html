<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Atividades Jinja{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: rgba(30, 41, 59, 0.7);
            --content-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Glassmorphism */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-right: 1px solid var(--border);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            padding: 0.875rem 1rem;
            border-radius: 0.75rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            transform: translateX(4px);
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 3rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .content-card {
            background: var(--content-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        p {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        ul.data-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        ul.data-list li {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.2s ease;
        }

        ul.data-list li:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.05);
        }

        .badge-green {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .badge-red {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>Aulas de Jinja</h2>
        <ul class="nav-links">
            <li><a href="{{ url_for('home') }}">1. Olá Nome</a></li>
            <li><a href="{{ url_for('alunos') }}">2. Nome e Idade</a></li>
            <li><a href="{{ url_for('usuario') }}">3. Dados do Usuário</a></li>
            <li><a href="{{ url_for('lista_nomes') }}">4. Lista de Nomes</a></li>
            <li><a href="{{ url_for('notas') }}">5. Situação Notas</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="content-card">
            {% block content %}
            {% endblock %}
        </div>
    </main>

</body>
</html>
